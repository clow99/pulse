name: Build and Deploy Next.js App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pulse_test
        options: >-
          --health-cmd="pg_isready -U postgres -d pulse_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      CI: "true"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_MAXSOCKETS: "10"
      NPM_CACHE_DIR: ~/.npm
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pulse_test?schema=public
      NEXTAUTH_SECRET: test-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PULSE_REGISTRY: 10.0.0.2:5000
      SKOPEO_IMAGE: quay.io/skopeo/stable@sha256:c4c8a9d6fc95e331fa92fc31de3f6c9b5fe4761c82f0acb99669eef067fb7c33

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (with caching)
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NPM_CACHE_DIR }}
          key: npm-${{ runner.os }}-node20-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node20-

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund --prefer-offline --legacy-peer-deps --cache "${NPM_CACHE_DIR}"

      - name: Guard Prisma schema changes include migrations
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "::notice::[Prisma Guard] No comparable base SHA; skipping migration guard."
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"

          schema_changed=false
          migration_changed=false

          while IFS= read -r changed_file; do
            case "${changed_file}" in
              prisma/schema.prisma)
                schema_changed=true
                ;;
              prisma/migrations/*/migration.sql)
                migration_changed=true
                ;;
            esac
          done <<< "${CHANGED_FILES}"

          if [ "${schema_changed}" = true ] && [ "${migration_changed}" = false ]; then
            echo "::error::[Prisma Guard] prisma/schema.prisma changed without a migration SQL file."
            echo "::error::[Prisma Guard] Run 'npx prisma migrate dev --name <change>' and commit the generated migration."
            exit 1
          fi

          echo "::notice::[Prisma Guard] Migration guard passed."

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run lint
        run: npm run lint

      - name: Run Next.js build
        run: npm run build

      - name: Set image metadata
        run: echo "OCI_CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build web Docker image
        run: >-
          docker build -f Dockerfile
          --build-arg PULSE_RELEASE_SHA=${{ github.sha }}
          --build-arg PULSE_SCHEMA_VERSION=20260713010000_project_intelligence_v1
          --build-arg OCI_SOURCE=https://git.cameronlow.com/cam/pulse
          --build-arg OCI_REVISION=${{ github.sha }}
          --build-arg OCI_CREATED=${OCI_CREATED}
          -t pulse:latest .

      - name: Build migration Docker image
        run: >-
          docker build -f Dockerfile --target migrator
          --build-arg OCI_SOURCE=https://git.cameronlow.com/cam/pulse
          --build-arg OCI_REVISION=${{ github.sha }}
          --build-arg OCI_CREATED=${OCI_CREATED}
          -t pulse-migrate:latest .

      - name: Verify web image exists
        run: |
          docker image inspect pulse:latest > /dev/null
          docker image inspect pulse-migrate:latest > /dev/null

      - name: Push web image (immutable)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$SKOPEO_IMAGE" copy --dest-tls-verify=false \
            docker-daemon:pulse:latest "docker://$PULSE_REGISTRY/pulse:sha-${{ github.sha }}"

      - name: Push web image (live)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$SKOPEO_IMAGE" copy --dest-tls-verify=false \
            docker-daemon:pulse:latest "docker://$PULSE_REGISTRY/pulse:live"

      - name: Push migration image (immutable)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$SKOPEO_IMAGE" copy --dest-tls-verify=false \
            docker-daemon:pulse-migrate:latest "docker://$PULSE_REGISTRY/pulse-migrate:sha-${{ github.sha }}"

      - name: Push migration image (live)
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$SKOPEO_IMAGE" copy --dest-tls-verify=false \
            docker-daemon:pulse-migrate:latest "docker://$PULSE_REGISTRY/pulse-migrate:live"
